name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: NODE_OPTIONS=--max-old-space-size=4096 npx tsc --noEmit

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /var/www/hotel
            git fetch origin && git reset --hard origin/master
            rm -rf .next
            npm ci --production=false
            npx prisma@6 generate
            DISABLE_WEBPACK_CACHE=1 NODE_OPTIONS=--max-old-space-size=2048 npm run build
            npx prisma@6 db push --skip-generate
            # Seed wyłączony na produkcji — import config-snapshot nadpisywał ustawienia (numeracja, szablony, cenniki). Seed tylko lokalnie.
            # Wstrzykuj zmienne SMTP z GitHub Secrets (nie nadpisuje reszty .env)
            if [ -n "${{ secrets.SMTP_HOST }}" ]; then
              sed -i '/^SMTP_/d' .env
              echo "" >> .env
              echo "# SMTP (wstrzykane przez deploy)" >> .env
              echo "SMTP_HOST=\"${{ secrets.SMTP_HOST }}\"" >> .env
              echo "SMTP_PORT=\"${{ secrets.SMTP_PORT }}\"" >> .env
              echo "SMTP_USER=\"${{ secrets.SMTP_USER }}\"" >> .env
              echo "SMTP_PASS=\"${{ secrets.SMTP_PASS }}\"" >> .env
              [ -n "${{ secrets.SMTP_FROM }}" ] && echo "SMTP_FROM=\"${{ secrets.SMTP_FROM }}\"" >> .env
            fi
            pm2 reload hotel-pms
            sleep 10 && curl -f http://127.0.0.1:3000/api/health || exit 1

  deploy-training:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy training to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            TRAINING_DIR="/var/www/hotel-training"
            # Sync z głównego deployu (git fetch nie działa na serwerze)
            rsync -a --delete --exclude=node_modules --exclude=.next --exclude=.git /var/www/hotel/ "$TRAINING_DIR/"
            cd "$TRAINING_DIR"
            rm -rf .next
            npm ci --production=false
            npx prisma@6 generate
            DISABLE_WEBPACK_CACHE=1 NODE_OPTIONS=--max-old-space-size=2048 npm run build
            pm2 restart hotel-training || pm2 start /var/www/hotel/ecosystem.training.config.js
            pm2 save
            sleep 5
            curl -f http://127.0.0.1:3012/training || echo "WARNING: training health check failed"
